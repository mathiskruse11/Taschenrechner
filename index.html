<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="containerCalculator">
      <div class="containerInput">
        <div id="preStep">0</div>
        <div id="input">0</div>
      </div>
      <div class="buttonGrid">
        <button class="buttons">7</button><button class="buttons">8</button>
        <button class="buttons">9</button><button class="buttons">/</button>
        <button class="buttons">4</button><button class="buttons">5</button>
        <button class="buttons">6</button><button class="buttons">*</button>
        <button class="buttons">1</button><button class="buttons">2</button>
        <button class="buttons">3</button><button class="buttons">-</button>
        <button class="buttons">CE</button><button class="buttons">0</button>
        <button class="buttons">=</button><button class="buttons">+</button>
      </div>
    </div>
    <div class="containerHistory"></div>
  </body>
</html>
