<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="containerCalculator">
        <div class="containerInput">
          <div id="preStep">0</div>
          <div id="input">0</div>
        </div>
        <div class="buttonGrid">
          <button onclick="number(7)" class="buttons">7</button>
          <button onclick="number(8)" class="buttons">8</button>
          <button onclick="number(9)" class="buttons">9</button>
          <button onclick="divided()" class="buttons">/</button>
          <button onclick="number(4)" class="buttons">4</button>
          <button onclick="number(5)" class="buttons">5</button>
          <button onclick="number(6)" class="buttons">6</button>
          <button onclick="multiplied()" class="buttons">*</button>
          <button onclick="number(1)" class="buttons">1</button>
          <button onclick="number(2)" class="buttons">2</button>
          <button onclick="number(3)" class="buttons">3</button>
          <button onclick="subtract()" class="buttons">-</button>
          <button onclick="clearEntry()" class="buttons">CE</button>
          <button onclick="number(0)" class="buttons">0</button>
          <button onclick="enter()" class="buttons">=</button>
          <button onclick="add()" class="buttons">+</button>
        </div>
      </div>
      <div id="history" class="history"></div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
