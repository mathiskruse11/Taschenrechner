<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taschenrechner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="containerCalculator">
        <div class="containerInput">
          <div id="preStep">0 =</div>
          <div id="input">0</div>
        </div>
        <div class="buttonGrid">
          <button onclick="calcItem(7)" class="buttons">7</button
          ><button onclick="calcItem(8)" class="buttons">8</button>
          <button onclick="calcItem(9)" class="buttons">9</button
          ><button onclick="calcItem('/')" class="buttons">/</button>
          <button onclick="calcItem(4)" class="buttons">4</button
          ><button onclick="calcItem(5)" class="buttons">5</button>
          <button onclick="calcItem(6)" class="buttons">6</button
          ><button onclick="calcItem('*')" class="buttons">*</button>
          <button onclick="calcItem(1)" class="buttons">1</button
          ><button onclick="calcItem(2)" class="buttons">2</button>
          <button onclick="calcItem(3)" class="buttons">3</button
          ><button onclick="calcItem('-')" class="buttons">-</button>
          <button onclick="calcItem('CE')" class="buttons">CE</button
          ><button onclick="calcItem(0)" class="buttons">0</button>
          <button onclick="calcItem('=')" class="buttons">=</button
          ><button onclick="calcItem('+')" class="buttons">+</button>
        </div>
      </div>
      <div class="history"></div>
    </div>
  </body>
</html>
